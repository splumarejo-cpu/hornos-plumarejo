<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Galería Food Trucks | Hornos Plumarejos</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0a;
      --text: #f0f0f0;
      --primary: #ff6b35;
      --primary-hover: #e85a28;
      --neutral-100: #1a1a1a;
      --neutral-200: #2a2a2a;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
    h1, h2, h3 { font-family: 'Playfair Display', serif; font-weight: 600; }
    
    /* Header (Simple) */
    header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(10, 10, 10, 0.95);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--neutral-200);
      padding: 1rem 5%;
      display: flex; justify-content: space-between; align-items: center;
    }
    .logo-img { height: 50px; width: auto; border-radius: 4px; }
    .back-btn {
      color: var(--text); text-decoration: none; font-size: 0.9rem; font-weight: 500;
      padding: 0.5rem 1rem; border: 1px solid var(--neutral-200); border-radius: 4px;
      transition: all 0.3s ease;
    }
    .back-btn:hover { background: var(--text); color: var(--bg); }

    /* Galeria Layout */
    .gallery-header {
      text-align: center; padding: 4rem 1rem 2rem;
    }
    .gallery-title { font-size: 2.5rem; margin-bottom: 0.5rem; }
    .gallery-sub { color: #aaa; max-width: 600px; margin: 0 auto; }

    .masonry-grid {
      column-count: 3;
      column-gap: 1rem;
      padding: 2rem 5%;
    }
    @media(max-width: 900px) { .masonry-grid { column-count: 2; } }
    @media(max-width: 600px) { .masonry-grid { column-count: 1; } }

    .masonry-item {
      break-inside: avoid;
      margin-bottom: 1rem;
      border-radius: 8px;
      overflow: hidden;
      background: var(--neutral-100);
      transition: transform 0.3s ease;
    }
    .masonry-item:hover { transform: scale(1.02); }
    .masonry-item img {
      width: 100%; height: auto; display: block;
    }
  </style>
</head>
<body>

  <header>
    <a href="index.html">
      <img src="Logo Perfil Hornos plumarejo .png" alt="Hornos Plumarejos" class="logo-img">
    </a>
    <a href="index.html#galeria" class="back-btn">← Volver al Inicio</a>
  </header>

  <main>

  </main>
